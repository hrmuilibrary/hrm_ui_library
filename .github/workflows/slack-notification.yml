name: Microsoft Teams Notification on Pull Request Events

on:
  pull_request:
    types:
      - opened
      - reopened

jobs:
  send_teams_notification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Post to Microsoft Teams
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "@type": "MessageCard",
                 "@context": "https://schema.org/extensions",
                 "themeColor": "70AEFF",
                 "summary": "New Pull Request",
                 "sections": [{
                   "activityTitle": "📢 New Pull Request Detected",
                   "facts": [
                     {
                       "name": "Author",
                       "value": "${{ github.event.pull_request.user.login }}"
                     },
                     {
                       "name": "Repository",
                       "value": "${{ github.repository }}"
                     },
                     {
                       "name": "PR Title",
                       "value": "${{ github.event.pull_request.title }}"
                     },
                     {
                       "name": "Source Branch",
                       "value": "${{ github.event.pull_request.head.ref }}"
                     },
                     {
                       "name": "Target Branch",
                       "value": "${{ github.event.pull_request.base.ref }}"
                     }
                   ],
                   "markdown": true
                 }],
                 "potentialAction": [{
                   "@type": "OpenUri",
                   "name": "View Pull Request",
                   "targets": [{
                     "os": "default",
                     "uri": "${{ github.event.pull_request.html_url }}"
                   }]
                 }]
               }' \
               ${{ secrets.TEAMS_WEBHOOK_URL }}